name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # Qt's offscreen platform still needs these libraries without a display
      - run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libegl1 libxkbcommon0 libfontconfig1 libglib2.0-0 libdbus-1-3
      - run: pip install -e ".[dev]"
      - run: ruff check src tests
      - run: pytest -q
